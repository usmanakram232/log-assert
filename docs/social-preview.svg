  <text x="720" y="120" fill="#c792ea" font-size="13.5">@ExtendWith</text>
  <text x="810" y="120" fill="#546e7a" font-size="13.5">(LogCaptorExtension.class)</text>

  <!-- ln 2 -->
  <text x="687" y="144" fill="#2d3f55" font-size="11" text-anchor="middle">2</text>
  <text x="720" y="144" fill="#546e7a" font-size="13.5" font-style="italic">class </text>
  <text x="756" y="144" fill="#82aaff" font-size="13.5" font-weight="600">OrderServiceTest </text>
  <text x="896" y="144" fill="#546e7a" font-size="13.5">{</text>

  <!-- ln 3 blank -->
  <text x="687" y="168" fill="#2d3f55" font-size="11" text-anchor="middle">3</text>

  <!-- ln 4 -->
