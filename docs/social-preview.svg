  <line x1="54" y1="330" x2="594" y2="330" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Feature list -->
  <circle cx="66" cy="364" r="5" fill="#22d3ee"/>
  <text x="84" y="370" class="sans" fill="#94a3b8" font-size="16">
