  <rect width="1280" height="640" fill="url(#glowL)"/>
  <rect width="1280" height="640" fill="url(#glowR)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="640" fill="url(#pillGrad)"/>

  <!-- ══════════════ LEFT PANEL ══════════════ -->

  <!-- Mini icon: bracket + log lines + checkmark -->
  <path d="M66 112 L52 112 L52 200 L66 200"
