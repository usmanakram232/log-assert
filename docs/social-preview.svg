  </text>

  <!-- Tech pills row -->
  <rect x="54"  y="468" width="84"  height="30" rx="15" fill="rgba(34,211,238,0.08)"  stroke="rgba(34,211,238,0.3)"  stroke-width="1.2"/>
  <text x="96"  y="488" class="sans" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">JUnit 5</text>

  <rect x="146" y="468" width="78"  height="30" rx="15" fill="rgba(52,211,153,0.08)"  stroke="rgba(52,211,153,0.3)"  stroke-width="1.2"/>
