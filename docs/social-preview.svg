  <text x="736" y="192" fill="#c792ea" font-size="13.5">@InjectLogCaptor</text>

  <!-- ln 5 -->
  <text x="687" y="216" fill="#2d3f55" font-size="11" text-anchor="middle">5</text>
  <text x="736" y="216" fill="#82aaff" font-size="13.5">LogCaptor </text>
  <text x="806" y="216" fill="#94a3b8" font-size="13.5">logCaptor;</text>

  <!-- ln 6 blank -->
  <text x="687" y="240" fill="#2d3f55" font-size="11" text-anchor="middle">6</text>

  <!-- ln 7 -->
  <text x="687" y="264" fill="#2d3f55" font-size="11" text-anchor="middle">7</text>
  <text x="736" y="264" fill="#c792ea" font-size="13.5">@Test</text>

  <!-- ln 8 -->
  <text x="687" y="288" fill="#2d3f55" font-size="11" text-anchor="middle">8</text>
  <text x="736" y="288" fill="#546e7a" font-size="13.5" font-style="italic">void </text>
  <text x="771" y="288" fill="#22d3ee" font-size="13.5">payment_failure_is_logged</text>
  <text x="1035" y="288" fill="#546e7a" font-size="13.5">() {</text>

  <!-- ln 9 — highlighted assertThat line -->
  <rect x="706" y="298" width="514" height="26" rx="4"
        fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <text x="687" y="316" fill="#2d3f55" font-size="11" text-anchor="middle">9</text>
  <text x="752" y="316" fill="#22d3ee" font-size="13.5" font-weight="600">assertThat</text>
