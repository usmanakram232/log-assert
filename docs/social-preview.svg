  <!-- Chrome bar -->
  <rect x="668" y="48" width="572" height="46" rx="16" fill="#0a0f1e"/>
  <rect x="668" y="72" width="572" height="22" fill="#0a0f1e"/>
  <circle cx="699" cy="71" r="7" fill="rgba(251,113,133,0.65)"/>
