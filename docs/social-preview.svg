  <text x="100" y="156" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">WARN</text>
  <rect x="130" y="147" width="86" height="10" rx="3" fill="rgba(148,163,184,0.18)"/>
  <rect x="130" y="147" width="74" height="10" rx="3" fill="rgba(148,163,184,0.1)"/>

  <rect x="78" y="170" width="44" height="18" rx="4"
