  <rect x="406" y="468" width="76"  height="30" rx="15" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1.2"/>
  <text x="444" y="488" class="sans" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Java 21</text>

