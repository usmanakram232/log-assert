  <!-- ln 10 -->
  <text x="687" y="344" fill="#2d3f55" font-size="11" text-anchor="middle">10</text>
  <text x="768" y="344" fill="#22d3ee" font-size="13.5">.atLevel</text>
  <text x="824" y="344" fill="#94a3b8" font-size="13.5">(Level.</text>
  <text x="872" y="344" fill="#fb7185" font-size="13.5">ERROR</text>
  <text x="913" y="344" fill="#94a3b8" font-size="13.5">)</text>

  <!-- ln 11 -->
  <text x="687" y="372" fill="#2d3f55" font-size="11" text-anchor="middle">11</text>
  <text x="768" y="372" fill="#22d3ee" font-size="13.5">.fromLogger</text>
  <text x="852" y="372" fill="#94a3b8" font-size="13.5">(OrderService.class)</text>

  <!-- ln 12 -->
  <text x="687" y="400" fill="#2d3f55" font-size="11" text-anchor="middle">12</text>
  <text x="768" y="400" fill="#22d3ee" font-size="13.5">.single</text>
  <text x="818" y="400" fill="#94a3b8" font-size="13.5">()</text>

  <!-- ln 13 -->
  <text x="687" y="428" fill="#2d3f55" font-size="11" text-anchor="middle">13</text>
  <text x="768" y="428" fill="#22d3ee" font-size="13.5">.hasFormattedMessageContaining</text>
  <text x="1036" y="428" fill="#94a3b8" font-size="13.5">(</text>
  <text x="1045" y="428" fill="#34d399" font-size="13.5">"Payment rejected"</text>
  <text x="1170" y="428" fill="#94a3b8" font-size="13.5">)</text>

  <!-- ln 14 — highlighted pass line -->
  <rect x="706" y="440" width="514" height="26" rx="4"
        fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.12)" stroke-width="1"/>
  <text x="687" y="456" fill="#2d3f55" font-size="11" text-anchor="middle">14</text>
  <text x="768" y="456" fill="#22d3ee" font-size="13.5">.hasThrowable</text>
  <text x="870" y="456" fill="#94a3b8" font-size="13.5">(IllegalArgumentException.class);</text>

  <!-- ln 15 -->
  <text x="687" y="484" fill="#2d3f55" font-size="11" text-anchor="middle">15</text>
  <text x="720" y="484" fill="#546e7a" font-size="13.5">}</text>

  <!-- PASS badge -->
  <rect x="854" y="506" width="120" height="34" rx="17"
